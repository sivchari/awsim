version: 2

project_name: kumo

before:
  hooks:
    - go mod tidy

builds:
  - id: kumo
    main: ./cmd/kumo
    binary: kumo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: kumo
    formats: ['tar.gz']
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ['zip']
    files:
      - LICENSE
      - README.md
    ids:
      - kumo

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  sort: asc

release:
  use_existing_draft: true

dockers:
  - image_templates:
      - "ghcr.io/sivchari/kumo:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/sivchari/kumo"

  - image_templates:
      - "ghcr.io/sivchari/kumo:{{ .Version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/sivchari/kumo"

homebrew_casks:
  - name: kumo
    ids:
      - kumo
    binaries:
      - kumo
    homepage: "https://github.com/sivchari/kumo"
    description: "A lightweight AWS service emulator for CI/CD environments"
    repository:
      owner: sivchari
      name: homebrew-kumo
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

docker_manifests:
  - name_template: "ghcr.io/sivchari/kumo:{{ .Version }}"
    image_templates:
      - "ghcr.io/sivchari/kumo:{{ .Version }}-amd64"
      - "ghcr.io/sivchari/kumo:{{ .Version }}-arm64"
  - name_template: "ghcr.io/sivchari/kumo:latest"
    image_templates:
      - "ghcr.io/sivchari/kumo:{{ .Version }}-amd64"
      - "ghcr.io/sivchari/kumo:{{ .Version }}-arm64"
